services:
  ai-service:
    build: .
    container_name: medical-ai-engine
    ports:
      - "8701:8701"
    env_file:
      - .env
    # volumes:
    #   - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8701/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  default:
    name: medical-ai-network